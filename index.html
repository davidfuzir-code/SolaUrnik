<title>Rezultati NPZ</title>

<body>

<h2>Vpisi svojo kodo za ogled rezultatov</h2>

<input type="text" id="koda">
<button onclick="preveri()">Poglej rezultat</button>

<script>

function preveri() {

}

else {

alert("Napačna koda");

}

}

</script>
